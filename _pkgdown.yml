url: https://rpkgs.datanovia.com/factoextra/
template:
  bootstrap: 5
  bootswatch: lumen
reference:
  - title: Visualizing Dimension Reduction Analysis Outputs
    desc:  Visualization of PCA, CA, MCA, FAMD, MFA and HMFA.
    contents:
      - eigenvalue
      - fviz_pca
      - fviz_ca
      - fviz_mca
      - fviz_famd
      - fviz_mfa
      - fviz_hmfa
      - fviz
      - fviz_ellipses
      - fviz_cos2
      - fviz_contrib
  - title: Visualizing Embeddings (UMAP / t-SNE)
    desc: Scatter plots of UMAP / t-SNE embeddings (no eigenvalues; see the two-track note in ?fviz_umap).
    contents:
      - fviz_umap
  - title: Extracting Data from Dimension Reduction Analysis Outputs
    desc: Extracting data from the output of PCA, CA, MCA, FAMD, MFA and HMFA.
    contents:
      - as_factoextra_pca
      - facto_summarize
      - get_pca
      - get_ca
      - get_mca
      - get_famd
      - get_mfa
      - get_hmfa
  - title: Clustering
    desc: Computing and visualizing clustering
    contents: 
      - dist
      - get_clust_tendency
      - fviz_nbclust
      - fviz_dend
      - fviz_cluster
      - fviz_silhouette
      - hcut
      - hkmeans
      - eclust
      - fviz_mclust
  - title: Data
    desc: Data sets included in factoextra and used in examples.
    contents: 
      - decathlon2
      - housetasks
      - poison
      - multishapes
  - title: Themes and Color Palettes
    desc: Stateless, explicit helpers for publication-grade appearance.
    contents:
      - theme_factoextra
      - factoextra_palette
  - title: Others
    contents:
      - fviz_add
      - print.factoextra
      - factominer_category_map
      - map_factominer_legacy_names
      - deprecated
    

